name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint — code quality check
        run: npm run lint

      - name: Integration tests — Jest
        run: npm test

      - name: Bundle size check — size-limit
        run: npm run size
